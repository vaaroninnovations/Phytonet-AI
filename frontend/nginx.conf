# PhytoNet AI — production nginx config for the SPA container
# ---------------------------------------------------------------
# Serves the CRA build with proper SPA fallback, gzip, long-lived cache
# for hashed static assets, and reverse-proxies `/api/*` to the backend
# FastAPI service (reachable as http://backend:8001 on the compose net).

server {
    listen 3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload limit for docking/report artefacts
    client_max_body_size 32M;

    # gzip for text/js/css/json
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Healthcheck endpoint (nginx-side)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy API + streaming SSE endpoints to backend service
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll friendly
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Cookies (JWT session)
        proxy_set_header Cookie $http_cookie;
    }

    # Google OAuth callback lives on the backend
    location /auth/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache hashed static assets produced by CRA (main.<hash>.js etc.)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
